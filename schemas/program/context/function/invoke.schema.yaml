$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "schema:ethdebug/format/program/context/function/invoke"

title: ethdebug/format/program/context/function/invoke
description: |
  Context for a function being invoked. Covers internal calls
  (JUMP), external contract calls (CALL, DELEGATECALL, STATICCALL),
  and contract creation (CREATE, CREATE2).

  Extends the function identity schema with variant-specific
  fields such as call targets, gas, value, and input data.

type: object
properties:
  invoke:
    type: object
    title: Function invocation
    description: |
      Represents a function invocation: an internal call (via JUMP),
      an external call (via CALL opcodes), or a contract creation
      (via CREATE/CREATE2).

    $ref: "schema:ethdebug/format/program/context/function"

    allOf:
      - oneOf:
          - required: [internal]
          - required: [call]
          - required: [create]
      - if:
          required: [internal]
        then:
          $ref: "#/$defs/InternalCall"
      - if:
          required: [call]
        then:
          $ref: "#/$defs/ExternalCall"
      - if:
          required: [create]
        then:
          $ref: "#/$defs/ContractCreation"

    unevaluatedProperties: false

required:
  - invoke

$defs:
  InternalCall:
    title: Internal call
    description: |
      Represents an internal function call within the same contract
      (via JUMP/JUMPI).
    type: object
    properties:
      internal:
        description: |
          Indicates this is an internal function call (JUMP/JUMPI).
        const: true

      target:
        type: object
        title: Invocation target
        description: |
          Pointer to the target of the invocation. For internal
          calls, this typically points to a code location.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      arguments:
        type: object
        title: Function arguments
        description: |
          Pointer to the arguments for an internal function call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

    required: [internal, target]

  ExternalCall:
    title: External call
    description: |
      Represents an external contract call via CALL, DELEGATECALL,
      or STATICCALL. The type of call may be indicated by setting
      `delegate` or `static` to `true`. If neither flag is present,
      the invocation represents a regular CALL.
    type: object
    properties:
      call:
        description: |
          Indicates this is an external contract call.
        const: true

      target:
        type: object
        title: Invocation target
        description: |
          Pointer to the target of the invocation. For external
          calls, this points to the address and/or selector
          being called.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      gas:
        type: object
        title: Gas allocation
        description: |
          Pointer to the gas allocated for the external call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      value:
        type: object
        title: ETH value
        description: |
          Pointer to the amount of ETH being sent with the call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      input:
        type: object
        title: Call input data
        description: |
          Pointer to the input data for the external call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      delegate:
        description: |
          Indicates this external call is a DELEGATECALL.
        const: true

      static:
        description: |
          Indicates this external call is a STATICCALL.
        const: true

    required: [call, target]

  ContractCreation:
    title: Contract creation
    description: |
      Represents a contract creation operation via CREATE or
      CREATE2. The presence of `salt` implies CREATE2.
    type: object
    properties:
      create:
        description: |
          Indicates this is a contract creation operation
          (CREATE or CREATE2).
        const: true

      value:
        type: object
        title: ETH value
        description: |
          Pointer to the amount of ETH being sent with the
          creation.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      salt:
        type: object
        title: CREATE2 salt
        description: |
          Pointer to the salt value for CREATE2. Its presence
          implies this is a CREATE2 operation.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      input:
        type: object
        title: Creation bytecode
        description: |
          Pointer to the creation bytecode for the new contract.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

    required: [create]

examples:
  - invoke:
      identifier: "transfer"
      declaration:
        source:
          id: 1
        range:
          offset: 256
          length: 80
      type:
        id: 42
      target:
        pointer:
          location: code
          offset: "0x100"
          length: 1
      internal: true
      arguments:
        pointer:
          group:
            - name: "arg0"
              location: stack
              slot: 0
            - name: "arg1"
              location: stack
              slot: 1

  - invoke:
      target:
        pointer:
          location: stack
          slot: 1
      call: true
      gas:
        pointer:
          location: stack
          slot: 0
      value:
        pointer:
          location: stack
          slot: 2
      input:
        pointer:
          group:
            - name: "selector"
              location: memory
              offset: "0x80"
              length: 4
            - name: "arguments"
              location: memory
              offset: "0x84"
              length: "0x40"

  - invoke:
      target:
        pointer:
          location: stack
          slot: 1
      call: true
      delegate: true
      gas:
        pointer:
          location: stack
          slot: 0
      input:
        pointer:
          location: memory
          offset: "0x80"
          length: "0x24"

  - invoke:
      create: true
      value:
        pointer:
          location: stack
          slot: 0
      salt:
        pointer:
          location: stack
          slot: 1
      input:
        pointer:
          location: memory
          offset: "0x80"
          length: "0x200"
