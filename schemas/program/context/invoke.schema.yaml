$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "schema:ethdebug/format/program/context/invoke"

title: ethdebug/format/program/context/invoke
description: |
  Schema for representing function invocation context at a specific
  point in program execution.

  This context captures information about function calls, including
  both internal function calls (via JUMP) and external contract calls
  (via CALL, DELEGATECALL, STATICCALL, etc.).

type: object
properties:
  invoke:
    type: object
    title: Function invocation
    description: |
      Represents a function invocation, either internal (via JUMP) or
      external (via CALL opcodes).

    allOf:
      - $ref: "schema:ethdebug/format/program/context/function"
      - oneOf:
          - required: [internal]
          - required: [external]
      - if:
          required: [internal]
        then:
          $ref: "#/$defs/InternalFunctionInvocation"
      - if:
          required: [external]
        then:
          $ref: "#/$defs/ExternalFunctionInvocation"

    unevaluatedProperties: false

required:
  - invoke

$defs:
  InternalFunctionInvocation:
    title: Internal function invocation
    type: object
    properties:
      target:
        type: object
        title: Invocation target
        description: |
          Pointer to the target of the invocation. For internal
          calls, this typically points to a code location.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      internal:
        description: |
          Indicates this is an internal function call (JUMP/JUMPI).
        const: true

      arguments:
        type: object
        title: Function arguments
        description: |
          Pointer to the arguments for an internal function call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false
    required: [internal, target]

  ExternalFunctionInvocation:
    title: External function invocation
    description: |
      Represents an external contract call. The type of call may be
      indicated by setting exactly one of `delegate`, `static`,
      `create`, or `create2` to `true`. If none of these flags is
      present, the invocation represents a regular CALL.
    type: object
    properties:
      target:
        type: object
        title: Invocation target
        description: |
          Pointer to the target of the invocation. For external
          calls, this points to the address and/or selector
          being called.

          Not used for contract creation operations
          (CREATE/CREATE2), where the creation bytecode is
          specified via input instead.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      external:
        description: |
          Indicates this is an external contract call.
        const: true

      gas:
        type: object
        title: Gas allocation
        description: |
          Pointer to the gas allocated for the external call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      value:
        type: object
        title: ETH value
        description: |
          Pointer to the amount of ETH being sent with the call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      salt:
        type: object
        title: CREATE2 salt
        description: |
          Pointer to the salt value for CREATE2.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      input:
        type: object
        title: Call input data
        description: |
          Pointer to the input data for the external call.
        properties:
          pointer:
            $ref: "schema:ethdebug/format/pointer"
        required:
          - pointer
        additionalProperties: false

      delegate:
        description: |
          Indicates this external call is a DELEGATECALL.
        const: true

      static:
        description: |
          Indicates this external call is a STATICCALL.
        const: true

      create:
        description: |
          Indicates this external call creates a new contract
          (CREATE).
        const: true

      create2:
        description: |
          Indicates this external call creates a new contract
          (CREATE2).
        const: true

    allOf:
      - if:
          anyOf:
            - required: [create]
            - required: [create2]
        then:
          properties:
            target: false
        else:
          required: [target]

    required: [external]

examples:
  - invoke:
      identifier: "transfer"
      declaration:
        source:
          id: 1
        range:
          offset: 256
          length: 80
      type:
        id: 42
      target:
        pointer:
          location: code
          offset: "0x100"
          length: 1
      internal: true
      arguments:
        pointer:
          group:
            - name: "arg0"
              location: stack
              slot: 0
            - name: "arg1"
              location: stack
              slot: 1

  - invoke:
      target:
        pointer:
          location: stack
          slot: 1
      external: true
      gas:
        pointer:
          location: stack
          slot: 0
      value:
        pointer:
          location: stack
          slot: 2
      input:
        pointer:
          group:
            - name: "selector"
              location: memory
              offset: "0x80"
              length: 4
            - name: "arguments"
              location: memory
              offset: "0x84"
              length: "0x40"

  - invoke:
      target:
        pointer:
          location: stack
          slot: 1
      external: true
      delegate: true
      gas:
        pointer:
          location: stack
          slot: 0
      input:
        pointer:
          location: memory
          offset: "0x80"
          length: "0x24"

  - invoke:
      external: true
      create2: true
      value:
        pointer:
          location: stack
          slot: 0
      salt:
        pointer:
          location: stack
          slot: 1
      input:
        pointer:
          location: memory
          offset: "0x80"
          length: "0x200"
