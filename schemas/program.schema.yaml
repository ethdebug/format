$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "schema:ethdebug/format/program"

title: ethdebug/format/program
description: |
  Debugging information about a particular bytecode in a compilation.

type: object

properties:
  compilation:
    title: Compilation reference by ID
    description: |
      A reference to the compilation as an `{ "id": ... }` object.
    $ref: "schema:ethdebug/format/materials/reference"

  contract:
    type: object
    properties:
      name:
        type: string

      definition:
        $ref: "schema:ethdebug/format/materials/source-range"
    required:
      - definition

  environment:
    title: Bytecode execution environment
    description: |
      Whether this bytecode is for contract creation or runtime calls.
    type: string
    enum:
      - call
      - create

  context:
    description: |
      The context known to exist prior to the execution of the first
      instruction in the bytecode.

      This field is **optional**. Omitting it is equivalent to specifying the
      empty context value (`{}`).
    $ref: "schema:ethdebug/format/program/context"
    default: {}

  instructions:
    type: array
    description: |
      The full array of instructions for the bytecode.
    items:
      $ref: "schema:ethdebug/format/program/instruction"
    additionalItems: false

required:
  - contract
  - environment
  - instructions

examples:
  - # Incrementing a storage counter
    #
    # This example represents the call bytecode for the following pseudo-code:
    # ```
    # contract Incrementer;
    #
    # storage {
    #   [0] storedValue: uint256;
    # };
    #
    # code {
    #   let localValue = storedValue;
    #   storedValue += 1;
    # };
    # ```
    contract:
      name: "Incrementer"
      definition:
        source:
          id: 0
    environment: call
    context:
      variables:
        - &stored-value
          identifier: storedValue
          type:
            kind: uint
            bits: 256
          pointer:
            location: storage
            slot: 0
    # Each instruction's pointers describe the machine state the
    # debugger observes when stopped at that instruction, i.e.
    # before it executes; stack `slot` counts from the top of
    # that pre-execution stack.
    instructions:
      - offset: 0
        # about to PUSH0; stack: (empty)
        operation:
          mnemonic: PUSH0
        context:
          variables:
            - *stored-value
      - offset: 1
        # about to SLOAD the slot pushed by PUSH0; stack: [0x00].
        # localValue is not observable until SLOAD produces it, so
        # it first appears at offset 2.
        operation:
          mnemonic: SLOAD
        context:
          variables:
            - *stored-value
      - offset: 2
        # about to PUSH1; stack: [localValue] (top is slot 0)
        operation:
          mnemonic: PUSH1
          arguments: ["0x01"]
        context:
          variables:
            - *stored-value
            - &local-value
              identifier: localValue
              type:
                kind: uint
                bits: 256
              pointer:
                location: stack
                slot: 0
      - offset: 4
        # about to ADD; stack: [localValue, 0x01], so localValue is
        # one below the top (slot 1). ADD then consumes it.
        operation:
          mnemonic: ADD
        context:
          variables:
            - *stored-value
            - <<: *local-value
              pointer:
                location: stack
                slot: 1
      - offset: 5
        # about to PUSH0; stack: [storedValue + 1]. localValue was
        # consumed by ADD and is no longer in scope.
        operation:
          mnemonic: PUSH0
        context:
          variables:
            - *stored-value
      - offset: 6
        # about to SSTORE; stack: [storedValue + 1, 0x00]
        operation:
          mnemonic: SSTORE
        context:
          variables:
            - *stored-value
